<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Tracker / Daily Planner</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="planner">
    <section class="planner__card">
      <p class="planner__eyebrow">Stay on track</p>
      <h1>Task Tracker / Daily Planner</h1>
      <p class="planner__subtitle">Capture today's work, mark progress, and keep everything saved in your browser.</p>

      <form class="task-form" id="taskForm">
        <label class="sr-only" for="taskInput">Enter a task</label>
        <input id="taskInput" type="text" placeholder="What needs to get done?" autocomplete="off">
        <button type="submit" id="addTaskButton">Add Task</button>
      </form>

      <div class="toolbar">
        <div class="filters" id="filters" aria-label="Task filters">
          <button type="button" class="filter-button is-active" data-filter="all">All</button>
          <button type="button" class="filter-button" data-filter="active">Active</button>
          <button type="button" class="filter-button" data-filter="completed">Completed</button>
        </div>
        <p class="task-count" id="taskCount">0 tasks</p>
      </div>

      <ul id="taskList" class="task-list" aria-live="polite"></ul>
      <p id="emptyState" class="empty-state">No tasks yet. Add one to get started.</p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
